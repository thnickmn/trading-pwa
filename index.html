<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HWR Pro v4</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #4a4a6a;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn:active { transform: scale(0.95); }
        .btn.loading { opacity: 0.6; }

        #stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }

        .stat { font-weight: 600; }
        .stat.win { color: #4caf50; }
        .stat.loss { color: #f44336; }
        .stat.rate { color: #ffeb3b; }

        .last-update {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 5px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #4a4a6a;
            color: #fff;
        }

        main { padding: 15px; }

        #signals-container {
            display: grid;
            gap: 12px;
        }

        .signal-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #666;
        }

        .signal-card.long { border-left-color: #4caf50; }
        .signal-card.short { border-left-color: #f44336; }
        .signal-card.neutral { border-left-color: #888; }

        .signal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .symbol-icon { font-size: 1.3rem; }
        .symbol-name { font-weight: 600; font-size: 1.1rem; }

        .signal-direction {
            margin-left: auto;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .signal-direction.long { color: #4caf50; }
        .signal-direction.short { color: #f44336; }
        .signal-direction.neutral { color: #888; }

        .signal-price {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .signal-time {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 8px;
        }

        .signal-score {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .signal-levels {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .level.tp { color: #4caf50; }
        .level.sl { color: #f44336; }

        .trade-status {
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .trade-status.active {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }

        .trade-status.win {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .trade-status.loss {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 25px 0 15px;
            color: #aaa;
        }

        #history-container {
            display: grid;
            gap: 8px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.85rem;
        }

        .history-item.win { border-left: 3px solid #4caf50; }
        .history-item.loss { border-left: 3px solid #f44336; }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .history-dir {
            font-size: 0.75rem;
            color: #888;
        }

        .history-details {
            display: flex;
            gap: 15px;
            color: #aaa;
            font-size: 0.8rem;
        }

        .history-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
        }

        .no-history {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .loading { opacity: 0.5; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>📊 HWR Pro v4</h1>
            <div class="header-actions">
                <button class="btn" id="notification-btn" title="Notifications">🔔</button>
                <button class="btn" id="settings-btn" title="Settings">⚙️</button>
                <button class="btn" id="clear-btn">Clear</button>
                <button class="btn" id="refresh-btn">↻ Refresh</button>
            </div>
        </div>
        <div id="stats"></div>
        <div class="last-update">Updated: <span id="last-update">--</span></div>
    </header>

    <div class="tabs">
        <div class="tab active" data-category="indices">📈 Indices</div>
        <div class="tab" data-category="metals">🥇 Metals</div>
        <div class="tab" data-category="energy">🛢️ Energy</div>
        <div class="tab" data-category="currencies">💱 Currencies</div>
        <div class="tab" data-category="treasuries">🏛️ Treasuries</div>
        <div class="tab" data-category="grains">🌾 Grains</div>
        <div class="tab" data-category="livestock">🐄 Livestock</div>
    </div>

    <main>
        <div id="signals-container"></div>

        <div class="section-title">📜 Trade History</div>
        <div id="history-container"></div>
    </main>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-content">
            <div class="settings-header">
                <h2>⚙️ Settings</h2>
                <button id="close-settings" class="close-btn">✕</button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <h3>🔔 Notifications</h3>
                    <label class="toggle">
                        <input type="checkbox" id="notify-signals">
                        <span>Signal Alerts (Long/Short)</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="notify-wins">
                        <span>Win/Loss Alerts</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="notify-high-conf">
                        <span>High Confluence Only (5+)</span>
                    </label>
                </div>
                <div class="setting-group">
                    <h3>📊 Display</h3>
                    <label class="toggle">
                        <input type="checkbox" id="show-history" checked>
                        <span>Show Trade History</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="dark-mode" checked>
                        <span>Dark Mode</span>
                    </label>
                </div>
                <div class="setting-group">
                    <h3>⏱️ Refresh Interval</h3>
                    <select id="refresh-interval">
                        <option value="60000">1 minute</option>
                        <option value="180000" selected>3 minutes</option>
                        <option value="300000">5 minutes</option>
                        <option value="600000">10 minutes</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
